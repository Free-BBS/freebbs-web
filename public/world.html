<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FREE-BBS - 世界</title>
    <link rel="icon" type="image/png" href="./assets/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@500;700;800&family=Noto+Serif+SC:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
    <link rel="stylesheet" href="./world.css" />
  </head>
  <body class="world-page">
    <div class="page-shell page-shell-world">
      <header class="topbar">
        <a class="brand" href="./index.html" aria-label="FREE-BBS 首页">
          <span class="brand-mark">FREE<br />BBS</span>
        </a>

        <form class="searchbar" id="world-search-form" role="search">
          <span class="search-symbol" aria-hidden="true">⌕</span>
          <input id="world-search-input" type="search" placeholder="搜索知识点、课程区域" aria-label="搜索知识点" autocomplete="off" />
        </form>

        <nav class="nav-actions" aria-label="顶部导航">
          <a class="nav-link active" href="./world.html" aria-current="page">
            <img class="nav-icon" src="./assets/icons/map.svg" alt="" aria-hidden="true" />
            <span>世界</span>
          </a>
          <a class="nav-link" href="./discussion.html">
            <img class="nav-icon" src="./assets/icons/people.svg" alt="" aria-hidden="true" />
            <span>讨论</span>
          </a>
          <a class="nav-link fortune-link hidden" href="#">
            <img class="nav-icon" src="./assets/icons/yunshi.svg" alt="" aria-hidden="true" />
            <span>今日运势</span>
          </a>
          <a class="nav-link manage-link hidden" href="./adminusers.html">
            <img class="nav-icon" src="./assets/icons/gear.svg" alt="" aria-hidden="true" />
            <span>管理</span>
          </a>

          <div class="user-panel" id="user-panel">
            <div class="user-summary">
              <button class="avatar" type="button" aria-label="用户头像">
                <img class="avatar-image" id="avatar-image" src="./assets/avatar_placeholder.png" alt="用户头像占位图" />
              </button>
              <div class="user-copy">
                <button class="user-name" type="button" id="user-name">登录/注册</button>
                <div class="user-role" id="user-role">学生</div>
              </div>
            </div>
            <div class="user-status" id="user-status">
              <span class="currency currency-electric" data-tooltip="电元" aria-label="电元">
                <img class="currency-icon" src="./assets/icons/electron.svg" alt="电元" />
                <span class="currency-value">-</span>
              </span>
              <span class="currency currency-magnetic" data-tooltip="磁元" aria-label="磁元">
                <img class="currency-icon" src="./assets/icons/magnetron.svg" alt="磁元" />
                <span class="currency-value">-</span>
              </span>
            </div>
          </div>
        </nav>
      </header>

      <nav class="mobile-nav" aria-label="手机底部导航">
        <a class="nav-link active" href="./world.html" aria-current="page">
          <img class="nav-icon" src="./assets/icons/map.svg" alt="" aria-hidden="true" />
          <span>世界</span>
        </a>
        <a class="nav-link" href="./discussion.html">
          <img class="nav-icon" src="./assets/icons/people.svg" alt="" aria-hidden="true" />
          <span>讨论</span>
        </a>
        <a class="nav-link fortune-link hidden" href="#">
          <img class="nav-icon" src="./assets/icons/yunshi.svg" alt="" aria-hidden="true" />
          <span>今日运势</span>
        </a>
        <a class="nav-link manage-link hidden" href="./adminusers.html">
          <img class="nav-icon" src="./assets/icons/gear.svg" alt="" aria-hidden="true" />
          <span>管理</span>
        </a>
      </nav>

      <main class="main-content world-main">
        <section class="world-shell" aria-label="世界知识地图">
          <div class="world-map-card" id="world-map-card">
            <div class="world-map-toolbar" aria-label="地图控制">
              <button class="world-tool-button" type="button" id="zoom-in" aria-label="放大">+</button>
              <button class="world-tool-button" type="button" id="zoom-out" aria-label="缩小">−</button>
              <button class="world-tool-button world-tool-reset" type="button" id="zoom-reset">重置</button>
            </div>

            <svg
              class="knowledge-map"
              id="knowledge-map"
              viewBox="0 0 1400 900"
              role="img"
              aria-label="电子系课程知识地图"
            >
              <defs>
                <filter id="nodeGlow" x="-120%" y="-120%" width="340%" height="340%">
                  <feGaussianBlur stdDeviation="5" result="blur" />
                  <feMerge>
                    <feMergeNode in="blur" />
                    <feMergeNode in="SourceGraphic" />
                  </feMerge>
                </filter>
                <filter id="edgeGlow" x="-80%" y="-80%" width="260%" height="260%">
                  <feGaussianBlur stdDeviation="3" result="blur" />
                  <feMerge>
                    <feMergeNode in="blur" />
                    <feMergeNode in="SourceGraphic" />
                  </feMerge>
                </filter>
                <linearGradient id="islandGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#18334a" stop-opacity="0.95" />
                  <stop offset="55%" stop-color="#0f263a" stop-opacity="0.88" />
                  <stop offset="100%" stop-color="#081522" stop-opacity="0.96" />
                </linearGradient>
                <radialGradient id="nodeCore" cx="50%" cy="50%" r="50%">
                  <stop offset="0%" stop-color="#ffffff" />
                  <stop offset="42%" stop-color="#84f2ff" />
                  <stop offset="100%" stop-color="#2b78ff" />
                </radialGradient>
              </defs>
              <g id="map-viewport">
                <g id="region-layer"></g>
                <g id="edge-layer"></g>
                <g id="node-layer"></g>
              </g>
            </svg>

            <div class="world-tooltip" id="world-tooltip" role="tooltip"></div>
          </div>

          <aside class="world-detail-panel" id="world-detail-panel" aria-live="polite" aria-hidden="true"></aside>
        </section>
      </main>
    </div>

    <script src="./app.js"></script>
    <script src="./world.js"></script>
  </body>
</html>
