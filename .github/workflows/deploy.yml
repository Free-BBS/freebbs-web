name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_db_migrations:
        description: "Run database migrations during deploy"
        required: false
        default: false
        type: boolean

concurrency:
  group: free-bbs-production
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Validate project
        run: bash scripts/ci-validate.sh

  deploy:
    runs-on: ubuntu-latest
    needs: validate
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_PORT: ${{ vars.DEPLOY_PORT || '22' }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_PATH: ${{ vars.DEPLOY_PATH || '/data/www/free-BBS' }}
      ENV_FILE: ${{ vars.FREE_BBS_ENV_FILE || '/etc/free-bbs/free-bbs.env' }}
      FRONTEND_SERVICE_NAME: ${{ vars.FRONTEND_SERVICE_NAME || 'free-bbs-frontend' }}
      BACKEND_SERVICE_NAME: ${{ vars.BACKEND_SERVICE_NAME || 'free-bbs-backend' }}
      HEALTHCHECK_URL: ${{ vars.HEALTHCHECK_URL || 'http://127.0.0.1:3001/api/health' }}
      RUN_DB_MIGRATIONS: ${{ github.event_name == 'workflow_dispatch' && inputs.run_db_migrations && '1' || '0' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Package release
        run: |
          set -euo pipefail
          ARCHIVE_PATH="/tmp/free-bbs-${GITHUB_SHA}.tar.gz"
          tar \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='database/uploads' \
            -czf "$ARCHIVE_PATH" .

      - name: Configure SSH
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$DEPLOY_PORT" "$DEPLOY_HOST" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Upload release artifact
        run: |
          set -euo pipefail
          ARCHIVE_PATH="/tmp/free-bbs-${GITHUB_SHA}.tar.gz"
          scp -P "$DEPLOY_PORT" "$ARCHIVE_PATH" "$DEPLOY_USER@$DEPLOY_HOST:/tmp/free-bbs-${GITHUB_SHA}.tar.gz"

      - name: Deploy on app server
        run: |
          set -euo pipefail
          ssh -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "set -euo pipefail; \
             RELEASE_DIR=/tmp/free-bbs-release-${GITHUB_SHA}; \
             rm -rf \"\$RELEASE_DIR\"; \
             mkdir -p \"\$RELEASE_DIR\"; \
             tar -xzf /tmp/free-bbs-${GITHUB_SHA}.tar.gz -C \"\$RELEASE_DIR\"; \
             cd \"\$RELEASE_DIR\"; \
             DEPLOY_DIR='$DEPLOY_PATH' \
             FREE_BBS_ENV_FILE='$ENV_FILE' \
             FRONTEND_SERVICE_NAME='$FRONTEND_SERVICE_NAME' \
             BACKEND_SERVICE_NAME='$BACKEND_SERVICE_NAME' \
             RUN_DB_MIGRATIONS='$RUN_DB_MIGRATIONS' \
             HEALTHCHECK_URL='$HEALTHCHECK_URL' \
             bash scripts/deploy.sh; \
             rm -rf \"\$RELEASE_DIR\" /tmp/free-bbs-${GITHUB_SHA}.tar.gz"
