name: Database Migration

on:
  workflow_dispatch:
    inputs:
      confirm_production_database:
        description: "Type RUN to execute production database scripts"
        required: true
        type: string

concurrency:
  group: free-bbs-production-db
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_PORT: ${{ vars.DEPLOY_PORT || '22' }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      ENV_FILE: ${{ vars.FREE_BBS_ENV_FILE || '/etc/free-bbs/free-bbs.env' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Validate confirmation
        run: |
          if [[ "${{ inputs.confirm_production_database }}" != "RUN" ]]; then
            echo "Refusing to run database migration without explicit RUN confirmation." >&2
            exit 1
          fi

      - name: Validate project
        run: bash scripts/ci-validate.sh

      - name: Package release
        run: |
          set -euo pipefail
          ARCHIVE_PATH="/tmp/free-bbs-${GITHUB_SHA}.tar.gz"
          tar \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='database/uploads' \
            -czf "$ARCHIVE_PATH" .

      - name: Configure SSH
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$DEPLOY_PORT" "$DEPLOY_HOST" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Upload release artifact
        run: |
          set -euo pipefail
          ARCHIVE_PATH="/tmp/free-bbs-${GITHUB_SHA}.tar.gz"
          scp -P "$DEPLOY_PORT" "$ARCHIVE_PATH" "$DEPLOY_USER@$DEPLOY_HOST:/tmp/free-bbs-${GITHUB_SHA}.tar.gz"

      - name: Run database migration remotely
        run: |
          set -euo pipefail
          ssh -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "set -euo pipefail; \
             RELEASE_DIR=/tmp/free-bbs-db-${GITHUB_SHA}; \
             rm -rf \"\$RELEASE_DIR\"; \
             mkdir -p \"\$RELEASE_DIR\"; \
             tar -xzf /tmp/free-bbs-${GITHUB_SHA}.tar.gz -C \"\$RELEASE_DIR\"; \
             cd \"\$RELEASE_DIR\"; \
             if [[ ! -f '$ENV_FILE' ]]; then echo 'missing env file: $ENV_FILE' >&2; exit 1; fi; \
             set -a; \
             . '$ENV_FILE'; \
             set +a; \
             bash scripts/migrate.sh; \
             rm -rf \"\$RELEASE_DIR\" /tmp/free-bbs-${GITHUB_SHA}.tar.gz"
